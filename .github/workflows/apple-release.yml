name: apple-release

on:
  workflow_call:
    inputs:
      app-identifier:
        description: "App bundle identifier"
        required: true
        type: string
      scheme:
        description: "Xcode scheme to build"
        required: true
        type: string
      xcodeproj:
        description: "Path to the .xcodeproj"
        required: true
        type: string
      lane:
        description: "Fastlane lane to run"
        required: false
        type: string
        default: "beta"
      deliver-submit:
        description: "Opt into a LIVE App Store metadata upload (deliver lane). Default false = validate only, never mutate ASC."
        required: false
        type: string
        default: "false"
      deliver-submit-for-review:
        description: "Opt into submitting the listing for App Store review (deliver lane). Requires deliver-submit=true. Default false."
        required: false
        type: string
        default: "false"
      deliver-phased-release:
        description: "Opt into App Store phased release (gradual rollout of the approved version) on the deliver lane. Requires deliver-submit=true. Default false."
        required: false
        type: string
        default: "false"
      testflight-distribute-external:
        description: "Opt into EXTERNAL TestFlight distribution (distribute_external lane). Default false = internal testers only."
        required: false
        type: string
        default: "false"
      testflight-groups:
        description: "Comma-separated external TestFlight group names (only used when testflight-distribute-external is true)."
        required: false
        type: string
        default: ""
      sentry-org:
        description: "Sentry (or GlitchTip) org slug for dSYM upload on the beta lane. OFF unless this AND sentry-project AND the SENTRY_AUTH_TOKEN secret are all set."
        required: false
        type: string
        default: ""
      sentry-project:
        description: "Sentry (or GlitchTip) project slug for dSYM upload on the beta lane. OFF unless this AND sentry-org AND the SENTRY_AUTH_TOKEN secret are all set."
        required: false
        type: string
        default: ""
      sentry-url:
        description: "Sentry server base URL for dSYM upload (sentry-cli SENTRY_URL). Leave empty for sentry.io (SaaS); set it to your instance (e.g. https://glitchtip.example.com) when using a self-hosted GlitchTip/Sentry."
        required: false
        type: string
        default: ""
      xcode-version:
        description: "Xcode version to select (Apple requires the latest SDK for uploads)"
        required: false
        type: string
        default: "26.3"
      test-device:
        description: "Simulator device for tests"
        required: false
        type: string
        default: "iPhone 16"
      ruby-version:
        description: "Ruby version for fastlane"
        required: false
        type: string
        default: "3.3"
    secrets:
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_PRIVATE_KEY:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_KEY_P8_BASE64:
        required: true
      SENTRY_AUTH_TOKEN:
        description: "Sentry (or GlitchTip) auth token for dSYM upload on the beta lane. OPTIONAL — absent => dSYM upload no-ops and the build still ships to TestFlight (never failed)."
        required: false

jobs:
  release:
    runs-on: macos-15
    env:
      APP_IDENTIFIER: ${{ inputs.app-identifier }}
      SCHEME: ${{ inputs.scheme }}
      XCODEPROJ: ${{ inputs.xcodeproj }}
      TEST_DEVICE: ${{ inputs.test-device }}
      DELIVER_SUBMIT: ${{ inputs.deliver-submit }}
      DELIVER_SUBMIT_FOR_REVIEW: ${{ inputs.deliver-submit-for-review }}
      DELIVER_PHASED_RELEASE: ${{ inputs.deliver-phased-release }}
      TESTFLIGHT_DISTRIBUTE_EXTERNAL: ${{ inputs.testflight-distribute-external }}
      TESTFLIGHT_GROUPS: ${{ inputs.testflight-groups }}
      # Sentry dSYM upload (EPIC-06 s2): all optional. The beta lane no-ops unless
      # the token + org + project are all present and non-blank (SentryDsymOptions),
      # so an app with no Sentry account ships exactly as before and CI stays green.
      SENTRY_ORG: ${{ inputs.sentry-org }}
      SENTRY_PROJECT: ${{ inputs.sentry-project }}
      # sentry-cli reads SENTRY_URL from the env natively; empty => sentry.io.
      # Set it for a self-hosted GlitchTip/Sentry instance.
      SENTRY_URL: ${{ inputs.sentry-url }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          XC="/Applications/Xcode_${{ inputs.xcode-version }}.app"
          [ -d "$XC" ] || XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$XC" ] || XC="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Set up SSH agent for match
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Add github.com to known_hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Cache DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.xcodeproj/**', '**/Package.resolved') }}

      # The beta lane shells out to sentry-cli for dSYM upload (EPIC-06 s2) and
      # GitHub's macOS runner images don't ship it, so install it first — but ONLY
      # when Sentry is fully + USABLY configured, so an app with no Sentry account
      # (or only a stray secret) adds zero install time and stays green.
      #
      # This step decides that, mirroring the lane's SentryDsymOptions EXACTLY:
      # all three of token/org/project must be present AND not an unexpanded
      # $(...)/${...} placeholder (which the lane treats as unset). Gating the
      # install on this — rather than a bare non-empty check — keeps the install's
      # condition identical to the lane's no-op condition, so a placeholder value
      # doesn't waste time installing a CLI the lane won't use.
      - name: Detect Sentry config
        id: sentry
        run: |
          set -euo pipefail
          usable() { # TRIMMED value is non-empty AND not a $(...)/${...} placeholder
            local v="$1"
            v="${v#"${v%%[![:space:]]*}"}"  # strip leading whitespace
            v="${v%"${v##*[![:space:]]}"}"  # strip trailing whitespace
            # shellcheck disable=SC2016  # single quotes are intentional: match
            # the LITERAL $( / ${ of an unexpanded placeholder, not an expansion.
            case "$v" in
              "" | '$('*')' | '${'*'}') return 1 ;;
              *) return 0 ;;
            esac
          }
          if usable "${SENTRY_AUTH_TOKEN:-}" && usable "${SENTRY_ORG:-}" && usable "${SENTRY_PROJECT:-}"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # Install via Homebrew (preinstalled on GitHub macOS runners) rather than
      # piping a remote `get-cli` script into a shell: this job has access to
      # signing material + secrets, so we avoid executing an unauthenticated
      # remote script. Homebrew fetches a checksummed bottle/formula from the
      # official getsentry tap. Pin a specific version by editing this line if a
      # reproducible build is required.
      - name: Install sentry-cli (dSYM upload)
        if: ${{ steps.sentry.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          brew install getsentry/tools/sentry-cli

      - name: Run fastlane
        run: bundle exec fastlane ${{ inputs.lane }}
