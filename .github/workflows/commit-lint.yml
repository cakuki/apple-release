# Commit-lint CI gate (EPIC-02, Task 2). The authoritative Conventional Commits
# enforcement point: runs `cog check` over the PR's base..HEAD range and fails
# CI on non-conventional commits. The local commit-msg hook is opt-in and NOT
# authoritative; this is. Also runs the pure-core stdlib-minitest suite so the
# shared Ruby modules stay green on every PR.
#
# This is a standalone `on: pull_request` workflow rather than a job in
# apple-release.yml because that workflow is `workflow_call`-only (it can't
# self-trigger on PRs), and this check needs no app inputs or signing secrets.
name: commit-lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    env:
      # Pinned cocogitto version — mirrors the SDK/Xcode-pinning discipline; an
      # unpinned cog could silently change `cog check` behaviour between runs.
      COG_VERSION: "6.5.0"
      # sha256 of cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz,
      # computed from the asset downloaded from the cocogitto 6.5.0 GitHub
      # Release. Verified before extraction to authenticate the bytes (the
      # version check only confirms the reported version). This digest is
      # specific to that one asset and MUST be updated whenever COG_VERSION
      # changes.
      COG_SHA256: "9de1086c8b6521a8a01abbd62c562d6d355990f542e3082b49ec4a597f925646"
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # `cog check` resolves base..HEAD; the default shallow clone breaks
          # range resolution on PRs, so fetch the full history.
          fetch-depth: 0

      - name: Set up Ruby (pinned)
        # Don't depend on whatever Ruby the runner image ships — pin it so this
        # gate stays stable as `ubuntu-latest` rolls. 3.3 matches the CI default
        # used elsewhere in the platform.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run pure-core test suite (cog absent → integration skips)
        # stdlib-only suite, no bundler; Ruby pinned by the step above. cog is
        # NOT installed yet at this point, so the real-cog integration test
        # (test/changelog_pipeline_integration_test.rb) SKIPs here — this run
        # doubles as proof the suite stays green on a cog-less box (the system-
        # ruby-2.6 dev environment). The same suite is re-run AFTER cog is
        # installed below, where the integration test actually executes.
        run: ruby test/all.rb

      - name: Install cocogitto (pinned)
        env:
          # We install cog explicitly rather than via cocogitto/cocogitto-action@v3:
          # the action accepts a `version` input but does NOT guarantee the exact
          # pinned binary is what runs, so a `version: ${{ env.COG_VERSION }}` pin
          # there is illusory — cog could silently drift between runs, defeating the
          # SDK/Xcode-pinning discipline this platform follows (cakuki/atelier#31).
          # Instead we install the pinned asset explicitly and verify it. We fetch the
          # prebuilt musl release binary onto PATH at the requested version. This is
          # the ONLY install path: the pinned prebuilt musl asset is deterministic, so
          # a failed download is a hard error (no cargo fallback — a source build would
          # be unpinned/non-deterministic, defeating the point of this pin).
          COG_VERSION: ${{ env.COG_VERSION }}
          COG_SHA256: ${{ env.COG_SHA256 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # Download + extract the pinned cog release into a temp dir
          # (RUNNER_TEMP, or /tmp as a fallback) and add it to PATH for this job.
          # `mktemp -d` gives a unique, randomly-named dir isolated to this job.
          workdir="$(mktemp -d -p "${RUNNER_TEMP:-/tmp}")"
          trap 'rm -rf "$workdir"' EXIT
          # cocogitto publishes its linux x86_64 release as the musl static build
          # named `cocogitto-<ver>-x86_64-unknown-linux-musl.tar.gz` (NOT `cog-...`).
          # Asset name verified against the cocogitto 6.5.0 release:
          #   gh api repos/cocogitto/cocogitto/releases/tags/6.5.0 --jq '.assets[].name'
          # The pinned prebuilt asset is the single, deterministic install path: if
          # the download fails we hard-error rather than falling back to an unpinned
          # source build, which would defeat the COG_VERSION pin.
          url="https://github.com/cocogitto/cocogitto/releases/download/${COG_VERSION}/cocogitto-${COG_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          if ! curl -sSfL "$url" -o "$workdir/cog.tar.gz"; then
            echo "::error::Failed to download pinned cog ${COG_VERSION} prebuilt asset from $url. No cargo fallback by design (would be unpinned); failing loudly."
            exit 1
          fi
          # Authenticate the downloaded bytes against the pinned sha256 BEFORE
          # extracting — a version check alone only confirms the reported version,
          # not that the bytes are untampered. Mismatch is a hard error; ::error::
          # goes to stdout so GitHub renders it.
          actual="$(shasum -a 256 "$workdir/cog.tar.gz" | awk '{print $1}')"
          if [ "$actual" != "${COG_SHA256}" ]; then
            echo "::error::cog tarball sha256 mismatch (expected ${COG_SHA256}, got ${actual}) — refusing to extract"
            exit 1
          fi
          tar -xzf "$workdir/cog.tar.gz" -C "$workdir"
          # The cog binary lives within OUR extraction dir; locate it inside
          # $workdir only (no scanning all of /tmp). The archive ships it nested
          # under a target-named dir (e.g. `x86_64-unknown-linux-musl/cog`), so
          # check the top level first then fall back to a bounded find.
          cog_bin="$workdir/cog"
          if [ ! -f "$cog_bin" ]; then
            cog_bin="$(find "$workdir" -type f -name cog -print -quit)"
          fi
          if [ -z "$cog_bin" ] || [ ! -f "$cog_bin" ]; then
            echo "::error::cog binary not found in extracted archive"; exit 1
          fi
          install -m 0755 "$cog_bin" "$HOME/.local/bin/cog"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify cog version
        env:
          # Fail the job if the installed cog isn't the pinned version — this is what
          # makes the COG_VERSION pin real (vs. the action's illusory input above).
          COG_VERSION: ${{ env.COG_VERSION }}
        run: |
          set -euo pipefail
          installed="$(cog --version)"
          echo "$installed"
          # `cog --version` prints `cog <X.Y.Z>` (clap-standard). Parse the version
          # token and compare it EXACTLY — a substring/glob match (e.g. `*6.5.0*`)
          # would false-positive on e.g. `cog 16.5.0`, so the pin must be exact.
          parsed="$(echo "$installed" | awk '{print $2}')"
          if [ "$parsed" != "${COG_VERSION}" ]; then
            echo "::error::Expected cog ${COG_VERSION}, got: $installed"; exit 1
          fi

      - name: Run real-cog integration suite (drift guard)
        # cog is now on PATH at the pinned version, so re-running the suite makes
        # the real-cog integration test ACTUALLY RUN (it skips when cog is
        # absent). This is the canonical guard against cog<->ChangelogFormatter
        # output drift (cakuki/atelier#26): it builds a throwaway repo, runs the
        # REAL `cog changelog`, and asserts the formatted TestFlight notes +
        # derived v<semver> tag match. Fails CI if the contract drifts.
        run: ruby test/all.rb

      - name: Resolve PR commit range
        id: range
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Make the PR base reachable as a remote-tracking ref for the range.
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          RANGE="$(ruby fastlane/commit_range.rb)"
          echo "Linting commit range: $RANGE"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: cog check (Conventional Commits)
        env:
          # Pass the range via env, not direct ${{ }} interpolation, and quote it
          # — avoids shell word-splitting/globbing and any expression injection.
          RANGE: ${{ steps.range.outputs.range }}
        run: cog --version && cog check "$RANGE"
